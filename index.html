<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>絵が動くAR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    width: 100%;
    height: 100%;
  }

  /* AR.js / A-Frame が生成する video, canvas を必ず最前面の背景として表示する */
  video {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    z-index: 1 !important;
  }

  a-scene {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 2 !important;
  }

  .a-canvas {
    z-index: 3 !important;
  }

  .arjs-loader {
    height: 100%;
    width: 100%;
    position: fixed;
    top: 0;
    left: 0;
    background-color: rgba(0, 0, 0, 0.85);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    padding: 0 24px;
  }

  .arjs-loader p {
    font-size: 16px;
    line-height: 1.6;
  }

  #status-banner {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    transition: opacity 0.4s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  #status-banner.hidden {
    opacity: 0;
  }

  /* ---- AR overlay scene (clouds + birds) ---- */
  #ar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
    display: none;
    overflow: hidden;
  }

  #ar-overlay.visible {
    display: block;
  }

  .cloud {
    position: absolute;
    opacity: 0.92;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06));
  }

  .cloud svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .cloud-1 {
    top: 14%;
    width: 26vw;
    max-width: 170px;
    min-width: 90px;
    animation: drift-right 22s linear infinite;
  }

  .cloud-2 {
    top: 30%;
    width: 18vw;
    max-width: 120px;
    min-width: 70px;
    animation: drift-right 30s linear infinite;
    animation-delay: -8s;
  }

  .cloud-3 {
    top: 8%;
    width: 14vw;
    max-width: 95px;
    min-width: 55px;
    animation: drift-left 26s linear infinite;
    animation-delay: -4s;
  }

  @keyframes drift-right {
    0%   { left: -30%; }
    100% { left: 120%; }
  }

  @keyframes drift-left {
    0%   { left: 120%; }
    100% { left: -30%; }
  }

  .bird {
    position: absolute;
    width: 34px;
    animation: fly-across 9s linear infinite;
  }

  .bird svg {
    display: block;
    width: 100%;
    animation: flap 0.5s ease-in-out infinite alternate;
    transform-origin: center;
  }

  .bird-1 { top: 22%; animation-duration: 8s; }
  .bird-2 { top: 16%; animation-duration: 11s; animation-delay: -3s; width: 24px; }
  .bird-3 { top: 27%; animation-duration: 13s; animation-delay: -7s; width: 20px; }

  @keyframes fly-across {
    0%   { left: -10%; transform: translateY(0px); }
    25%  { transform: translateY(-14px); }
    50%  { transform: translateY(4px); }
    75%  { transform: translateY(-8px); }
    100% { left: 110%; transform: translateY(0px); }
  }

  @keyframes flap {
    0%   { transform: scaleY(1); }
    100% { transform: scaleY(0.55); }
  }

  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    text-align: center;
    max-width: 80%;
  }
</style>
</head>

<body style="margin: 0; overflow: hidden;">

  <div class="arjs-loader" id="loader">
    <p>カメラを準備しています…</p>
  </div>

  <div id="status-banner">絵にカメラを向けてください</div>
  <div id="hint">絵全体が画面に入るようにかざしてください</div>

  <!-- 雲と鳥のオーバーレイ（絵を検出している間だけ表示） -->
  <div id="ar-overlay">
    <div class="cloud cloud-1">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="40" rx="26" ry="16" fill="#ffffff"/>
        <ellipse cx="55" cy="30" rx="22" ry="20" fill="#ffffff"/>
        <ellipse cx="75" cy="42" rx="18" ry="14" fill="#ffffff"/>
        <ellipse cx="48" cy="46" rx="34" ry="12" fill="#ffffff"/>
      </svg>
    </div>

    <div class="cloud cloud-2">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="40" rx="24" ry="14" fill="#ffffff"/>
        <ellipse cx="58" cy="32" rx="20" ry="18" fill="#ffffff"/>
        <ellipse cx="50" cy="46" rx="32" ry="11" fill="#ffffff"/>
      </svg>
    </div>

    <div class="cloud cloud-3">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="35" cy="38" rx="22" ry="14" fill="#ffffff"/>
        <ellipse cx="60" cy="30" rx="18" ry="16" fill="#ffffff"/>
        <ellipse cx="48" cy="44" rx="30" ry="10" fill="#ffffff"/>
      </svg>
    </div>

    <div class="bird bird-1">
      <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 15 C20 0, 0 4, 2 12 C12 8, 22 13, 30 15 C38 13, 48 8, 58 12 C60 4, 40 0, 30 15 Z" fill="#2b2b2b"/>
      </svg>
    </div>

    <div class="bird bird-2">
      <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 15 C20 0, 0 4, 2 12 C12 8, 22 13, 30 15 C38 13, 48 8, 58 12 C60 4, 40 0, 30 15 Z" fill="#2b2b2b"/>
      </svg>
    </div>

    <div class="bird bird-3">
      <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 15 C20 0, 0 4, 2 12 C12 8, 22 13, 30 15 C38 13, 48 8, 58 12 C60 4, 40 0, 30 15 Z" fill="#2b2b2b"/>
      </svg>
    </div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; alpha: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; sourceWidth: 640; sourceHeight: 480; displayWidth: 640; displayHeight: 480;"
  >
    <a-nft
      type="nft"
      url="markers/scene"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
    </a-nft>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const loader = document.getElementById('loader');
    const overlay = document.getElementById('ar-overlay');
    const banner = document.getElementById('status-banner');
    const hint = document.getElementById('hint');

    function hideLoader() {
      loader.style.display = 'none';
    }

    // カメラ映像取得イベントでローダーを消す
    window.addEventListener('camera-init', hideLoader);
    document.addEventListener('camera-init', hideLoader);

    // フェイルセーフ: 一定時間後に必ず消す
    setTimeout(hideLoader, 4000);

    window.addEventListener('load', () => {
      setTimeout(hideLoader, 2500);
    });

    // エラーが起きた場合に画面に表示する(デバッグ用)
    window.addEventListener('error', (e) => {
      const msg = document.createElement('div');
      msg.style.position = 'fixed';
      msg.style.bottom = '0';
      msg.style.left = '0';
      msg.style.right = '0';
      msg.style.background = 'rgba(200,0,0,0.85)';
      msg.style.color = '#fff';
      msg.style.fontSize = '11px';
      msg.style.padding = '8px';
      msg.style.zIndex = '999999';
      msg.style.wordBreak = 'break-all';
      msg.textContent = 'Error: ' + (e.message || e.error || '不明なエラー');
      document.body.appendChild(msg);
    });

    const nft = document.querySelector('a-nft');

    nft.addEventListener('targetFound', () => {
      overlay.classList.add('visible');
      banner.textContent = '絵を検出しました';
      banner.classList.add('hidden');
      hint.style.display = 'none';
    });

    nft.addEventListener('targetLost', () => {
      overlay.classList.remove('visible');
      banner.textContent = '絵にカメラを向けてください';
      banner.classList.remove('hidden');
      hint.style.display = 'block';
    });
  </script>

</body>
</html>
